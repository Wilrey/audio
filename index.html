<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Trigger</title>
<style>
  body { font-family: Arial; padding: 20px; }
  #status { margin-left: 10px; color: green; }
</style>
</head>
<body>

<button onclick="start()">Reproducir audio</button>
<span id="status"></span>

<script>
const CLIENT_ID = "b85aea77-eb2c-454c-a8e9-a00ee57d5f3f";
const REDIRECT_URI = "https://wilrey.github.io/audio/";
const REGION = "mypurecloud.de";

const AUTH_URL = `https://login.${REGION}/oauth/authorize`;
const TOKEN_URL = `https://login.${REGION}/oauth/token`;
const API_URL = `https://api.${REGION}`;

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function randomString(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let result = '';
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// LOGIN
async function start() {
  const codeVerifier = randomString(64);
  const codeChallenge = await sha256(codeVerifier);

  sessionStorage.setItem("verifier", codeVerifier);

  const conversationId = getParam("conversationId");
  sessionStorage.setItem("conversationId", conversationId);

  const url = `${AUTH_URL}?response_type=code`
    + `&client_id=${CLIENT_ID}`
    + `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
    + `&code_challenge=${codeChallenge}`
    + `&code_challenge_method=S256`;

  window.location = url;
}

// TOKEN
async function getToken(code) {
  const verifier = sessionStorage.getItem("verifier");

  const body = new URLSearchParams();
  body.append("grant_type", "authorization_code");
  body.append("client_id", CLIENT_ID);
  body.append("code", code);
  body.append("redirect_uri", REDIRECT_URI);
  body.append("code_verifier", verifier);

  const res = await fetch(TOKEN_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body
  });

  const data = await res.json();
  return data.access_token;
}

// API CALL
async function callApi(token) {
  const conversationId = sessionStorage.getItem("conversationId");

  await fetch(`${API_URL}/api/v2/conversations/calls/${conversationId}/participants`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      participants: [
        { address: "+34100" }
      ]
    })
  });

  document.getElementById("status").innerText = "Audio reproducido";

  setTimeout(() => window.close(), 500);
}

// FLOW
(async () => {
  const code = getParam("code");

  if (!code) return;

  const token = await getToken(code);
  await callApi(token);
})();
</script>

</body>
</html>
