
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Play Audio</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 10px 20px; font-size: 16px; }
    #log { margin-top: 20px; white-space: pre-wrap; background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

<h2>Audio Trigger</h2>

<button onclick="start()">Reproducir audio</button>
<button onclick="callParticipantsDirect()">Reintentar</button>

<div id="log"></div>

<script>
const CLIENT_ID = "b85aea77-eb2c-454c-a8e9-a00ee57d5f3f";
const REDIRECT_URI = "https://wilrey.github.io/audio/";
const REGION = "mypurecloud.de";

const AUTH_URL = `https://login.${REGION}/oauth/authorize`;
const TOKEN_URL = `https://login.${REGION}/oauth/token`;
const API_URL = `https://api.${REGION}`;

function log(msg) {
  document.getElementById("log").innerText += "\n" + msg;
}

// ======================
// UTIL
// ======================
function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function randomString(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let result = '';
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// ======================
// STEP 1: LOGIN PKCE
// ======================
async function start() {
  log("Iniciando PKCE...");

  const codeVerifier = randomString(64);
  const codeChallenge = await sha256(codeVerifier);

  sessionStorage.setItem("code_verifier", codeVerifier);

  const conversationId = getQueryParam("conversationId");
  if (!conversationId) {
    alert("Falta conversationId");
    return;
  }

  sessionStorage.setItem("conversationId", conversationId);

  const url = `${AUTH_URL}?response_type=code`
    + `&client_id=${CLIENT_ID}`
    + `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
    + `&code_challenge=${codeChallenge}`
    + `&code_challenge_method=S256`;

  window.location = url;
}

// ======================
// STEP 2: TOKEN
// ======================
async function handleRedirect() {
  const code = getQueryParam("code");
  if (!code) return;

  log("Recibido código OAuth...");

  const codeVerifier = sessionStorage.getItem("code_verifier");

  const body = new URLSearchParams();
  body.append("grant_type", "authorization_code");
  body.append("client_id", CLIENT_ID);
  body.append("code", code);
  body.append("redirect_uri", REDIRECT_URI);
  body.append("code_verifier", codeVerifier);

  const response = await fetch(TOKEN_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: body
  });

  const data = await response.json();

  if (!data.access_token) {
    log("ERROR obteniendo token:");
    log(JSON.stringify(data));
    return;
  }

  log("Token obtenido correctamente");

  sessionStorage.setItem("access_token", data.access_token);

  callParticipants(data.access_token);
}

// ======================
// STEP 3: CALL API
// ======================
async function callParticipants(token) {
  const conversationId = sessionStorage.getItem("conversationId");

  log("Llamando API /participants...");

  const res = await fetch(`${API_URL}/api/v2/conversations/calls/${conversationId}/participants`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      participants: [
        {
          address: "+34100"
        }
      ]
    })
  });

  const text = await res.text();

  log("Response:");
  log(text);

  if (res.ok) {
    alert("Audio disparado correctamente");
  } else {
    alert("Error en la llamada (ver log)");
  }
}

// ======================
// RETRY SIN LOGIN
// ======================
function callParticipantsDirect() {
  const token = sessionStorage.getItem("access_token");
  if (!token) {
    alert("No hay token, pulsa el botón principal primero");
    return;
  }
  callParticipants(token);
}

// ======================
handleRedirect();
</script>

</body>
</html>
